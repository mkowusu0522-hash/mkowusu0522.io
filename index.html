<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Judgment Engine</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-bottom: 12px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      cursor: pointer;
      background: black;
      color: white;
      border: none;
      border-radius: 6px;
      margin-top: 8px;
    }
    #output {
      margin-top: 25px;
      padding: 18px;
      background: white;
      border-radius: 6px;
      min-height: 40px;
      font-size: 18px;
      white-space: normal;
    }
  </style>
</head>

<body>
  <h1>Judgment Engine</h1>

  <input id="domain" placeholder="Domain (money, work, relationships, health, timing, lifestyle, strategy, emotional state)" />
  <input id="motivation" placeholder="Motivation (why consider this?)" />
  <input id="outcome" placeholder="Desired Outcome (what should happen if Yes?)" />
  <input id="decision" placeholder='Decision (Should I...?)' />

  <button onclick="runJudgment()">Run Judgment</button>

  <div id="output"></div>

  <script>
  function renderOutput(text) {
    const outputBox = document.getElementById("output");
    const t = (text || "").trim();
  
    if (!t) {
      outputBox.innerText = "";
      return;
    }
  
    const lines = t.split("\n").map(line => line.trim()).filter(Boolean);
  
    const verdictLine = lines[0] || "";
    const explanationLine = lines[1] || "";
    const moveLines = lines.slice(2);
  
    let html = "";
  
    if (verdictLine) {
      html += `<div style="margin-bottom:10px; line-height:1.5;">
        <strong>${verdictLine}</strong>
      </div>`;
    }
  
    if (explanationLine) {
      html += `<div style="margin-bottom:14px; line-height:1.6;">
        ${explanationLine}
      </div>`;
    }
  
    if (moveLines.length) {
      html += `<div style="line-height:1.8;">`;
  
      for (const line of moveLines) {
        const match = line.match(/^([^:—-]+)\s*[:—-]\s*(.*)$/);
  
        if (match) {
          const label = match[1].trim();
          const value = match[2].trim();
  
          const styledLabel =
            label === "Value"
              ? `<strong>${label}</strong>`
              : label;
  
          html += `<div>${styledLabel} — ${value}</div>`;
        } else {
          html += `<div>${line}</div>`;
        }
      }
  
      html += `</div>`;
    }
  
    outputBox.innerHTML = html || t;
  }
  </script>
</body>
</html>
