<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Judgment Engine</title>
<style>
body {
font-family: Arial, sans-serif;
max-width: 600px;
margin: 40px auto;
padding: 20px;
background: #f5f5f5;
}
h1 {
text-align: center;
margin-bottom: 20px;
}
textarea {
width: 100%;
height: 120px;
padding: 10px;
font-size: 16px;
margin-bottom: 20px;
}
button {
width: 100%;
padding: 12px;
font-size: 18px;
cursor: pointer;
background: black;
color: white;
border: none;
border-radius: 6px;
}
#output {
margin-top: 25px;
padding: 15px;
background: white;
border-radius: 6px;
min-height: 40px;
font-size: 18px;
}
</style>
</head>

<body>
<h1>Judgment Engine</h1>

<textarea id="input" placeholder="Enter any decision or object..."></textarea>

<button onclick="runJudgment()">Run Judgment</button>

<div id="output"></div>

<script>
async function runJudgment() {
const input = document.getElementById("input").value;
const outputBox = document.getElementById("output");
outputBox.innerText = "Processing...";

try {
const response = await fetch("/api/judge", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ input })
});

const data = await response.json();
outputBox.innerText = data.output || `Error: ${data.error || "Unknown"}${data.details ? " — " + data.details : ""}`;
} catch (err) {
outputBox.innerText = "Server error.";
}
}
</script>
</body>
</html>
