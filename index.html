<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Judgment Engine</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-bottom: 12px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      cursor: pointer;
      background: black;
      color: white;
      border: none;
      border-radius: 6px;
      margin-top: 8px;
    }
    #output {
      margin-top: 25px;
      padding: 15px;
      background: white;
      border-radius: 6px;
      min-height: 40px;
      font-size: 18px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <h1>Judgment Engine</h1>

  <input id="domain" placeholder="Domain (money, work, relationships, health, timing, lifestyle, strategy, emotional state)" />
  <input id="motivation" placeholder="Motivation (why consider this?)" />
  <input id="outcome" placeholder="Desired Outcome (what should happen if Yes?)" />
  <input id="decision" placeholder='Decision (Should I...?)' />

  <button onclick="runJudgment()">Run Judgment</button>

  <div id="output"></div>

  <script>
    async function runJudgment() {
      const outputBox = document.getElementById("output");

      const domain = document.getElementById("domain").value.trim();
      const motivation = document.getElementById("motivation").value.trim();
      const desiredOutcome = document.getElementById("outcome").value.trim();
      const decision = document.getElementById("decision").value.trim();

      if (!domain || !motivation || !desiredOutcome || !decision) {
        outputBox.innerText = "Enter Domain, Motivation, Desired Outcome, and Decision.";
        return;
      }

      outputBox.innerText = "Processing...";

      try {
        const response = await fetch("/api/judge", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ domain, motivation, desiredOutcome, decision })
        });

        const data = await response.json();
        outputBox.innerText =
          data.output ||
          `Error: ${data.error || "Unknown"}${data.details ? " — " + data.details : ""}`;
      } catch (err) {
        outputBox.innerText = "Server error.";
      }
    }
  </script>
</body>
</html>
